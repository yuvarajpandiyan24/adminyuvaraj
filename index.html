<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --background-color: #f3f4f6;
            --text-color: #1f2937;
            --sidebar-bg: #111827;
            --sidebar-text: #9ca3af;
            --sidebar-active: #ffffff;
            --error-color: #ef4444;
            --success-color: #10b981;
            --border-color: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--background-color); color: var(--text-color); height: 100vh; overflow: hidden; }
        .screen { display: none; height: 100%; }
        .screen.active { display: flex; }

        /* Login Screen */
        #login-screen { justify-content: center; align-items: center; background: linear-gradient(135deg, var(--primary-color) 0%, #1e1b4b 100%); }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); width: 100%; max-width: 400px; text-align: center; }
        .login-card h1 { margin-bottom: 0.5rem; color: var(--primary-color); }
        .login-card p { color: #6b7280; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; }
        .btn-primary { background-color: var(--primary-color); color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background-color 0.3s; width: 100%; }
        .btn-primary:hover { background-color: #1e40af; }
        .error-text { color: var(--error-color); margin-top: 1rem; font-size: 0.9rem; }

        /* Dashboard Screen */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; padding: 1.5rem; }
        .sidebar-header h2 { color: white; margin-bottom: 2rem; font-size: 1.5rem; text-align: center; }
        .sidebar nav ul { list-style: none; flex-grow: 1; }
        .nav-item { padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-radius: 6px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; }
        .nav-item i { margin-right: 0.75rem; width: 20px; }
        .nav-item:hover { background-color: #1f2937; color: white; }
        .nav-item.active { background-color: var(--primary-color); color: white; }
        .sidebar-footer { margin-top: auto; }
        .btn-outline { background: transparent; border: 1px solid #4b5563; color: #9ca3af; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; width: 100%; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 2rem; }
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border-color); }
        .content-header h1 { font-size: 1.8rem; color: var(--primary-color); }
        .content-header .btn-primary { width: auto; }

        /* Data Tables */
        .data-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .data-table th, .data-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        .data-table th { background-color: #f9fafb; font-weight: 600; color: #4b5563; }
        .unread { font-weight: bold; background-color: #f0f9ff; }
        .status-badge { padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .status-unread { background-color: #fee2e2; color: #991b1b; }
        .status-read { background-color: #d1fae5; color: #065f46; }
        .action-btns { display: flex; gap: 0.5rem; }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.1rem; transition: color 0.3s; }
        .btn-delete { color: var(--error-color); }
        .btn-view { color: var(--secondary-color); }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background-color: white; padding: 2rem; border-radius: 12px; width: 90%; max-width: 600px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 1.5rem; top: 1rem; font-size: 1.5rem; cursor: pointer; color: #6b7280; }
        #form-fields { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select { padding: 0.6rem; border: 1px solid var(--border-color); border-radius: 4px; }
        
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success-color); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Message Detail View */
        .message-detail p { margin-bottom: 1rem; line-height: 1.5; }
        .message-label { font-weight: bold; color: var(--primary-color); display: block; margin-bottom: 0.25rem; }
        .message-body { background: #f9fafb; padding: 1rem; border-radius: 6px; border: 1px solid var(--border-color); white-space: pre-wrap; }
        .reply-section { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-color); }
    </style>
</head>
<body>
    <div id="login-screen" class="screen active">
        <div class="login-card">
            <h1><i class="fas fa-lock"></i> Admin Portal</h1>
            <p>Enter your password to manage your portfolio</p>
            <form id="login-form">
                <div class="input-group"><input type="password" id="password" placeholder="Password" required></div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <p id="login-error" class="error-text"></p>
        </div>
    </div>

    <div id="dashboard-screen" class="screen">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>Admin Panel</h2></div>
            <nav>
                <ul>
                    <li class="nav-item active" data-section="works"><i class="fas fa-briefcase"></i> Works</li>
                    <li class="nav-item" data-section="experience"><i class="fas fa-history"></i> Experience</li>
                    <li class="nav-item" data-section="study"><i class="fas fa-graduation-cap"></i> Study</li>
                    <li class="nav-item" data-section="techstack"><i class="fas fa-layer-group"></i> Tech Stack</li>
                    <li class="nav-item" data-section="blogs"><i class="fas fa-blog"></i> Blog</li>
                    <li class="nav-item" data-section="messages"><i class="fas fa-envelope"></i> Messages</li>
                </ul>
            </nav>
            <div class="sidebar-footer"><button id="logout-btn" class="btn-outline"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
        </aside>
        <main class="main-content">
            <header class="content-header">
                <h1 id="section-title">Works</h1>
                <button id="add-new-btn" class="btn-primary"><i class="fas fa-plus"></i> Add New</button>
            </header>
            <div id="content-area"></div>
        </main>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Add New Item</h2>
            <div id="modal-body">
                <form id="modal-form">
                    <div id="form-fields"></div>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </form>
            </div>
        </div>
    </div>

                </form>

    <script>
        let currentSection = 'works';
        let authToken = localStorage.getItem('adminToken') || '';
        const API_BASE = 'https://yuvarajpandian-api.yuvarajpandian243.workers.dev/api'; // UPDATE THIS TO YOUR WORKER URL

        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const sectionTitle = document.getElementById('section-title');
        const contentArea = document.getElementById('content-area');
        const navItems = document.querySelectorAll('.nav-item');
        const addNewBtn = document.getElementById('add-new-btn');
        const modal = document.getElementById('modal');
        const modalForm = document.getElementById('modal-form');
        const formFields = document.getElementById('form-fields');
        const closeModal = document.querySelector('.close-modal');
        const logoutBtn = document.getElementById('logout-btn');

        if (authToken) showDashboard();

        loginForm.addEventListener('submit', handleLogin);
        logoutBtn.addEventListener('click', () => { localStorage.removeItem('adminToken'); location.reload(); });
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                currentSection = item.dataset.section;
                loadSectionContent();
            });
        });

        addNewBtn.addEventListener('click', () => openModal());
        closeModal.addEventListener('click', () => modal.style.display = 'none');
        modalForm.addEventListener('submit', handleFormSubmit);

        async function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();
                if (data.success) {
                    authToken = data.token;
                    localStorage.setItem('adminToken', authToken);
                    showDashboard();
                } else {
                    loginError.textContent = 'Invalid password.';
                }
            } catch (err) { loginError.textContent = 'Connection error.'; }
        }

        function showDashboard() {
            loginScreen.classList.remove('active');
            dashboardScreen.classList.add('active');
            loadSectionContent();
        }

        async function loadSectionContent() {
            sectionTitle.textContent = currentSection.charAt(0).toUpperCase() + currentSection.slice(1);
            addNewBtn.style.display = currentSection === 'messages' ? 'none' : 'block';
            contentArea.innerHTML = '<p>Loading...</p>';
            try {
                const response = await fetch(`${API_BASE}/${currentSection}`, {
                    headers: { 'Authorization': authToken }
                });
                const data = await response.json();
                renderTable(data);
            } catch (err) { contentArea.innerHTML = `<p class="error-text">Error: ${err.message}</p>`; }
        }

        function renderTable(data) {
            if (!data || data.length === 0) {
                contentArea.innerHTML = '<p>No items found.</p>';
                return;
            }

            let html = `<table class="data-table"><thead><tr>`;
            const headers = currentSection === 'messages' 
                ? ['status', 'from', 'email', 'subject', 'date', 'actions']
                : Object.keys(data[0]).filter(h => !['id', 'content', 'description', 'details', 'message'].includes(h));
            
            headers.forEach(h => html += `<th>${h.toUpperCase()}</th>`);
            html += `</tr></thead><tbody>`;

            data.forEach(item => {
                const isUnread = currentSection === 'messages' && !item.is_read;
                html += `<tr class="${isUnread ? 'unread' : ''}">`;
                headers.forEach(h => {
                    if (h === 'status') {
                        html += `<td><span class="status-badge ${item.is_read ? 'status-read' : 'status-unread'}">${item.is_read ? 'Read' : 'Unread'}</span></td>`;
                    } else if (h === 'from') {
                        html += `<td>${item.first_name} ${item.last_name}</td>`;
                    } else if (h === 'date') {
                        html += `<td>${new Date(item.created_at).toLocaleDateString()}</td>`;
                    } else if (h === 'is_new') {
                        html += `<td><label class="switch"><input type="checkbox" ${item[h] ? 'checked' : ''} onchange="toggleNewTag(${item.id}, this.checked)"><span class="slider"></span></label></td>`;
                    } else if (h === 'actions') {
                        html += `<td class="action-btns">
                            <button class="btn-icon btn-view" onclick="viewMessage(${JSON.stringify(item).replace(/"/g, '&quot;')})"><i class="fas fa-eye"></i></button>
                            <button class="btn-icon btn-delete" onclick="deleteItem(${item.id})"><i class="fas fa-trash"></i></button>
                        </td>`;
                    } else {
                        html += `<td>${item[h] || '-'}</td>`;
                    }
                });
                if (currentSection !== 'messages') {
                    html += `<td class="action-btns">
                        <button class="btn-icon btn-delete" onclick="deleteItem(${item.id})"><i class="fas fa-trash"></i></button>
                    </td>`;
                }
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            contentArea.innerHTML = html;
        }

        function viewMessage(msg) {
            document.getElementById('modal-title').textContent = "Message Details";
            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `
                <div class="message-detail">
                    <p><span class="message-label">From</span> ${msg.first_name} ${msg.last_name} (${msg.email})</p>
                    ${msg.company ? `<p><span class="message-label">Company</span> ${msg.company}</p>` : ''}
                    <p><span class="message-label">Subject</span> ${msg.subject}</p>
                    <p><span class="message-label">Category</span> ${msg.category || msg.type}</p>
                    <p><span class="message-label">Message</span></p>
                    <div class="message-body">${msg.message}</div>
                    <div class="reply-section">
                        <a href="mailto:${msg.email}?subject=Re: ${msg.subject}" class="btn-primary" style="text-decoration:none; display:inline-block; text-align:center;">
                            <i class="fas fa-reply"></i> Reply via Email
                        </a>
                    </div>
                </div>
            `;
            modal.style.display = 'flex';
            if (!msg.is_read) markAsRead(msg.id);
        }

        async function markAsRead(id) {
            try {
                await fetch(`${API_BASE}/messages/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': authToken }
                });
                loadSectionContent();
            } catch (err) { console.error(err); }
        }

        function openModal() {
            document.getElementById('modal-title').textContent = "Add New Item";
            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `<form id="modal-form"><div id="form-fields"></div><button type="submit" class="btn-primary">Save Changes</button></form>`;

        function renderTable(data) {
            if (!data || data.length === 0) {
                contentArea.innerHTML = '<p>No items found.</p>';
                return;
            }

            let html = `<table class="data-table"><thead><tr>`;
            const headers = currentSection === 'messages' 
                ? ['status', 'from', 'email', 'subject', 'date', 'actions']
                : Object.keys(data[0]).filter(h => !['id', 'content', 'description', 'details', 'message'].includes(h));
            
            headers.forEach(h => html += `<th>${h.toUpperCase()}</th>`);
            html += `</tr></thead><tbody>`;

            data.forEach(item => {
                const isUnread = currentSection === 'messages' && !item.is_read;
                html += `<tr class="${isUnread ? 'unread' : ''}">`;
                headers.forEach(h => {
                    if (h === 'status') {
                        html += `<td><span class="status-badge ${item.is_read ? 'status-read' : 'status-unread'}">${item.is_read ? 'Read' : 'Unread'}</span></td>`;
                    } else if (h === 'from') {
                        html += `<td>${item.first_name} ${item.last_name}</td>`;
                    } else if (h === 'date') {
                        html += `<td>${new Date(item.created_at).toLocaleDateString()}</td>`;
                    } else if (h === 'is_new') {
                        html += `<td><label class="switch"><input type="checkbox" ${item[h] ? 'checked' : ''} onchange="toggleNewTag(${item.id}, this.checked)"><span class="slider"></span></label></td>`;
                    } else if (h === 'actions') {
                        html += `<td class="action-btns">
                            <button class="btn-icon btn-view" onclick="viewMessage(${JSON.stringify(item).replace(/"/g, '&quot;')})"><i class="fas fa-eye"></i></button>
                            <button class="btn-icon btn-delete" onclick="deleteItem(${item.id})"><i class="fas fa-trash"></i></button>
                        </td>`;
                    } else {
                        html += `<td>${item[h] || '-'}</td>`;
                    }
                });
                if (currentSection !== 'messages') {
                    html += `<td class="action-btns">
                        <button class="btn-icon btn-delete" onclick="deleteItem(${item.id})"><i class="fas fa-trash"></i></button>
                    </td>`;
                }
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            contentArea.innerHTML = html;
        }
